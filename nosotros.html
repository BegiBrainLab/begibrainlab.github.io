<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nosotros - BegiBrainLab</title>
    <style>
      /* --- ESTILOS GENERALES Y CONFIGURACIÓN --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f8f9fa;
            color: #333;
            line-height: 1.6;
        }
        a {
            text-decoration: none;
            color: inherit;
        }

        /* --- CABECERA Y MENÚ DE NAVEGACIÓN --- */
        .header {
            background-color: #1a252f;
            color: #ffffff;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
        }
        .logo h1 {
            font-size: 24px;
            letter-spacing: 1px;
        }
        .nav-menu {
            list-style: none;
            display: flex;
            align-items: center;
        }
        /* Botones principales */
        .nav-item {
            position: relative;
        }
        .nav-link {
            display: block;
            padding: 10px 15px;
            font-weight: 500;
            transition: color 0.3s;
        }
        .nav-link:hover {
            color: #3498db;
        }
        /* Configuración del Desplegable (Dropdown) */
        .dropdown-menu {
            position: absolute;
            top: 100%;
            left: 0;
            background-color: #ffffff;
            color: #333333;
            list-style: none;
            min-width: 180px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
            border-radius: 4px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(10px);
            transition: all 0.3s ease;
        }
        .dropdown-menu li a {
            display: block;
            padding: 12px 15px;
            font-size: 14px;
            border-bottom: 1px solid #eee;
        }
        .dropdown-menu li:last-child a {
            border-bottom: none;
        }
        .dropdown-menu li a:hover {
            background-color: #f1f1f1;
            color: #3498db;
        }
        /* Mostrar desplegable al pasar el ratón */
        .nav-item:hover .dropdown-menu {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        /* --- CUERPO PRINCIPAL (CONTENEDORES) --- */
        .main-content {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .section-title {
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
            color: #2c3e50;
        }
        /* Grid de contenedores */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }
        /* Tarjetas / Contenedores */
        .card {
            background: #ffffff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(0,0,0,0.05);
            transition: transform 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card-image {
            width: 100%;
            height: 200px;
            background-color: #ddd; /* Color temporal si no hay imagen */
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-weight: bold;
        }
        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .card-body {
            padding: 20px;
        }
        .card-title {
            font-size: 20px;
            margin-bottom: 10px;
            color: #2c3e50;
        }
        .card-text {
            font-size: 15px;
            color: #666;
        }

        /* --- PIE DE PÁGINA (FOOTER) --- */
        .footer {
            background-color: #1a252f;
            color: #ecf0f1;
            padding: 40px 20px 20px;
            margin-top: 60px;
        }
        .footer-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 30px;
        }
        .footer-section {
            flex: 1;
            min-width: 250px;
        }
        .footer-section h3 {
            font-size: 18px;
            margin-bottom: 15px;
            color: #3498db;
            border-bottom: 2px solid #34495e;
            padding-bottom: 5px;
        }
        .footer-section p, .footer-section ul {
            font-size: 14px;
            color: #bdc3c7;
        }
        .footer-section ul {
            list-style: none;
        }
        .footer-section ul li {
            margin-bottom: 8px;
        }
        /* Logotipos de colaboradores simulados */
        .collab-logos {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .collab-logo {
            background-color: #34495e;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        .footer-bottom {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #34495e;
            font-size: 13px;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="nav-container">
            <div class="logo"><h1>BegiBrainLab</h1></div>
            <nav>
                <ul class="nav-menu">
                    <li class="nav-item"><a href="index.html" class="nav-link">Inicio</a></li>
                    <li class="nav-item"><a href="nosotros.html" class="nav-link">Nosotros</a></li>
                    <li class="nav-item">
                        <a href="#" class="nav-link">Servicios ▾</a>
                        <ul class="dropdown-menu">
                            <li><a href="servicio-consultoria.html">Consultoría</a></li>
                            <li><a href="servicio-desarrollo.html">Desarrollo Web</a></li>
                        </ul>
                    </li>
                    <li class="nav-item"><a href="blog.html" class="nav-link">Blog</a></li>
                    <li class="nav-item"><a href="contacto.html" class="nav-link">Contacto</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <h2 class="section-title">Sobre Nosotros</h2>
        <div style="background: white; padding: 30px; border-radius: 8px; box-shadow: 0 3px 10px rgba(0,0,0,0.05);">
            <p>Aquí va la historia de tu organización, quiénes componen el equipo, vuestra misión y visión.</p>
        </div>
    </main>

    <footer class="footer">
        </footer>

</body>
</html>
